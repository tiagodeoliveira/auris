    <path d="M 60 30 A 30 30 0 0 0 60 90" fill="none" stroke="#1e293b" stroke-width="9" stroke-linecap="round"/>
    <circle cx="44" cy="60" r="7" fill="#d97757"/>
    <text x="80" y="80" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif" font-size="72" font-weight="500" fill="#1e293b" letter-spacing="-2">auris</text>
  </g>
</svg>
