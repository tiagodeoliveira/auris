  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo for Auris, a meeting companion app. The mark is nested concentric arcs evoking an ear receiving sound, with a warm accent dot at the focal point. Paired with a lowercase wordmark. Three app icon variants below.</desc>

