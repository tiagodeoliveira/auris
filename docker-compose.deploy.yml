# Production / single-VM deploy stack. Pull the latest image from
# GHCR, restart the container, that's the update flow:
#
#   docker compose -f docker-compose.deploy.yml pull server
#   docker compose -f docker-compose.deploy.yml up -d server
#
# Uses an `.env.deploy` file for runtime configuration (Auth0 tenant,
# Soniox API key, mnemo URL, etc.) — see `.env.deploy.example` for
# the expected variable surface.
#
# State that survives container restarts:
#   - Postgres data        → named volume `pg-data`
#   - Server data dir      → named volume `server-data` (transcript JSONL,
#                            moment screenshots, artifact blobs)
#
# Notes on deployment:
#   - The server image is private on GHCR. The host needs to be logged
#     in to ghcr.io with a Personal Access Token (classic, scope
#     `read:packages`). One-time:
#       echo $GHCR_TOKEN | docker login ghcr.io -u <user> --password-stdin
#   - Postgres is bound to the docker network only — no host port
#     exposure. The server reaches it as `postgres:5432`.
#   - The server's `:7331` port is bound to 127.0.0.1 only — public
#     traffic must go through the `caddy` service below, which
#     terminates TLS using a Cloudflare Origin Certificate and reverse-
#     proxies to the server over the docker network. See
#     `docs/deploy-cloudflare.md` for the full runbook.

services:
  postgres:
    image: postgres:16-alpine
    container_name: meeting-companion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meeting_companion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.deploy}
      POSTGRES_DB: ${POSTGRES_DB:-meeting_companion}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-meeting_companion} -d ${POSTGRES_DB:-meeting_companion}",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    # Image tag pin: bump explicitly to roll a new release. `latest`
    # works for "always grab the newest main build" but defeats the
    # ability to roll back without remembering a sha. CI publishes
    # `latest`, `sha-<short>`, and `<git-tag>` — prefer the tag.
    image: ghcr.io/${GHCR_OWNER:?Set GHCR_OWNER in .env.deploy}/meeting-companion-server:${SERVER_TAG:-latest}
    container_name: meeting-companion-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ─── Required (server fails to start without these) ──────────────
      DATABASE_URL: postgres://${POSTGRES_USER:-meeting_companion}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-meeting_companion}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_API_AUDIENCE: ${AUTH0_API_AUDIENCE}

      # ─── Server runtime ─────────────────────────────────────────────
      MEETING_COMPANION_DATA_DIR: /data
      RUST_LOG: ${RUST_LOG:-info}
      MEETING_COMPANION_HEARTBEAT_MS: ${MEETING_COMPANION_HEARTBEAT_MS:-10000}

      # ─── Toggles (1 = enable, unset = off) ──────────────────────────
      # Intentionally listed without `${VAR:-}` defaults. The previous
      # `${VAR:-}` form expanded to an empty string when unset, and
      # the container env then carried `MEETING_COMPANION_AUDIO_DISABLED=""`
      # — which the Rust side's `std::env::var(...).is_ok()` check
      # treated as "set" → audio capture silently disabled in prod.
      # Listing the raw `${VAR}` causes docker-compose to forward the
      # variable only when the host actually defines it, and the
      # crate's `env::flag()` helper now also rejects empty values
      # defensively. Add to `.env.deploy` to enable.
      MEETING_COMPANION_AUTH_DISABLED: ${MEETING_COMPANION_AUTH_DISABLED}
      MEETING_COMPANION_LLM_DISABLED: ${MEETING_COMPANION_LLM_DISABLED}
      MEETING_COMPANION_AUDIO_DISABLED: ${MEETING_COMPANION_AUDIO_DISABLED}
      MEETING_COMPANION_SKIP_BOOT_RECOVERY: ${MEETING_COMPANION_SKIP_BOOT_RECOVERY}
      AGENT_LOG_PROMPT: ${AGENT_LOG_PROMPT}

      # ─── LLM provider ───────────────────────────────────────────────
      MEETING_COMPANION_LLM_PROVIDER: ${MEETING_COMPANION_LLM_PROVIDER:-bedrock}
      # Provider-specific defaults coded in src/llm.rs apply when unset:
      #   bedrock  → us.anthropic.claude-sonnet-4-7-20251015-v1:0
      #   openai   → gpt-4o
      #   anthropic→ claude-opus-4-7
      MEETING_COMPANION_LLM_MODEL_ID: ${MEETING_COMPANION_LLM_MODEL_ID:-}
      MEETING_COMPANION_LLM_REGION: ${MEETING_COMPANION_LLM_REGION:-us-west-2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}

      # ─── STT (speech-to-text) ───────────────────────────────────────
      MEETING_COMPANION_STT_PROVIDER: ${MEETING_COMPANION_STT_PROVIDER:-soniox}
      MEETING_COMPANION_SONIOX_MODEL: ${MEETING_COMPANION_SONIOX_MODEL:-stt-rt-preview}
      MEETING_COMPANION_STT_MOCK_INTERVAL_MS: ${MEETING_COMPANION_STT_MOCK_INTERVAL_MS:-3000}
      SONIOX_API_KEY: ${SONIOX_API_KEY:-}

      # ─── Agent loop (per ADR-0011) ──────────────────────────────────
      AGENT_TRIGGER_TOKENS: ${AGENT_TRIGGER_TOKENS:-200}
      AGENT_TRIGGER_SENTENCES: ${AGENT_TRIGGER_SENTENCES:-4}
      AGENT_TRIGGER_SILENCE_MS: ${AGENT_TRIGGER_SILENCE_MS:-4000}
      AGENT_TRIGGER_MAX_MS: ${AGENT_TRIGGER_MAX_MS:-30000}

      # ─── Summary mode ───────────────────────────────────────────────
      SUMMARY_TRIGGER_TOKENS: ${SUMMARY_TRIGGER_TOKENS:-500}
      SUMMARY_BOOTSTRAP_TOKENS: ${SUMMARY_BOOTSTRAP_TOKENS:-100}
      SUMMARY_TRIGGER_MAX_MS: ${SUMMARY_TRIGGER_MAX_MS:-300000}

      # ─── Moment summarizer (vision LLM context window) ──────────────
      MEETING_COMPANION_MOMENT_WINDOW_MS: ${MEETING_COMPANION_MOMENT_WINDOW_MS:-60000}
      MEETING_COMPANION_MOMENT_GRACE_MS: ${MEETING_COMPANION_MOMENT_GRACE_MS:-5000}

      # ─── mnemo memory layer (optional integration) ──────────────────
      # Unset = integration disabled. Both URL and API_KEY required to
      # enable. Names use the MEETING_COMPANION_ prefix per the server's
      # `mnemo::client` module — passing plain `MNEMO_URL` silently
      # disables the integration because the server can't find the
      # expected key.
      MEETING_COMPANION_MNEMO_URL: ${MEETING_COMPANION_MNEMO_URL:-}
      MEETING_COMPANION_MNEMO_API_KEY: ${MEETING_COMPANION_MNEMO_API_KEY:-}
      MEETING_COMPANION_MNEMO_WORKSTATION: ${MEETING_COMPANION_MNEMO_WORKSTATION:-}
    ports:
      # Bound to loopback only: public traffic comes through the
      # `caddy` service which terminates TLS and reverse-proxies
      # over the docker network. Keeping a host port at all (vs.
      # `expose:` only) makes `curl http://127.0.0.1:7331/...` on
      # the VM possible for debugging without going through Caddy.
      - "127.0.0.1:${SERVER_PORT:-7331}:7331"
    volumes:
      - server-data:/data
    # No server-side healthcheck yet — `/healthz` endpoint doesn't
    # exist on the server today. Add one (returns 200 OK + db ping)
    # alongside this and re-enable. depends_on already waits for
    # postgres's own healthcheck.

  caddy:
    # TLS terminator + reverse proxy. Serves the Cloudflare Origin
    # Certificate (bind-mounted from ./certs/) and forwards traffic
    # to the server container over the docker network. WebSocket
    # upgrades pass through transparently — no special config needed
    # in Caddy v2.
    image: caddy:2-alpine
    container_name: meeting-companion-caddy
    restart: unless-stopped
    depends_on:
      - server
    environment:
      # The Caddyfile reads `{$DOMAIN}` and `{$PORT}` at runtime.
      DOMAIN: ${PUBLIC_DOMAIN:?Set PUBLIC_DOMAIN in .env.deploy (e.g. auris.tiago.tools)}
      PORT: ${PUBLIC_PORT:-443}
    ports:
      # Default 443. Override via PUBLIC_PORT in .env.deploy when the
      # host already has something on :443. If you change this you
      # ALSO need a Cloudflare Origin Rule to send proxied traffic to
      # the new port — see docs/deploy-cloudflare.md.
      - "${PUBLIC_PORT:-443}:${PUBLIC_PORT:-443}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Drop the Cloudflare Origin Certificate + key here as
      # `cert.pem` and `key.pem`. The directory is gitignored.
      - ./certs:/etc/caddy/origin:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  pg-data:
  server-data:
  caddy-data:
  caddy-config:
