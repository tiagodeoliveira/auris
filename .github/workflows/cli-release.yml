name: cli-release
on:
  push:
    tags: ["v*"]
jobs:
  publish-cli:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # Stamp committed dev defaults with real values from repo Variables
      # BEFORE build so they compile into dist/. Empty variables fail loudly.
      # Reuses the same repo Variables the mac/pwa workflows use
      # (AUTH0_DOMAIN, AUTH0_API_AUDIENCE, AURIS_SERVER_URL). The CLI's
      # device-code client is its own app: AUTH0_CLI_CLIENT_ID.
      - name: Stamp CLI defaults from repo variables
        env:
          AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
          AUTH0_API_AUDIENCE: ${{ vars.AUTH0_API_AUDIENCE }}
          AUTH0_CLI_CLIENT_ID: ${{ vars.AUTH0_CLI_CLIENT_ID }}
          AURIS_SERVER_URL: ${{ vars.AURIS_SERVER_URL }}
        run: |
          : "${AUTH0_DOMAIN:?Set the AUTH0_DOMAIN repo variable}"
          : "${AUTH0_API_AUDIENCE:?Set the AUTH0_API_AUDIENCE repo variable}"
          : "${AUTH0_CLI_CLIENT_ID:?Set the AUTH0_CLI_CLIENT_ID repo variable}"
          : "${AURIS_SERVER_URL:?Set the AURIS_SERVER_URL repo variable}"
          # The CLI/MCP hit auris's REST API over https; AURIS_SERVER_URL is
          # the shared wss endpoint, so derive the https base from it (same
          # host) — matching how the mac/pwa clients derive their REST base.
          AURIS_BASE_URL=$(printf '%s' "$AURIS_SERVER_URL" | sed -E 's,^wss://,https://,; s,^ws://,http://,')
          cat > packages/cli/src/core/defaults.ts <<EOF
          // Auto-generated by .github/workflows/cli-release.yml from repo
          // Variables. Do not edit by hand; the committed copy carries dev
          // defaults for from-source builds.
          export const DEFAULTS = {
            aurisBaseUrl: '$AURIS_BASE_URL',
            auth0Domain: '$AUTH0_DOMAIN',
            auth0Audience: '$AUTH0_API_AUDIENCE',
            auth0ClientId: '$AUTH0_CLI_CLIENT_ID',
          } as const;
          EOF
      - name: build + pack
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @auris/cli build
          # `pnpm pack` did not gain workspace `--filter` support until
          # v10.11.0; this repo pins pnpm@9.0.0 (root package.json
          # "packageManager"), so `pnpm --filter @auris/cli pack` fails
          # with "Unknown option: 'recursive'". cd into the package instead.
          cd packages/cli && pnpm pack
      - name: attach tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/cli/*.tgz
