name: cli-release
on:
  push:
    tags: ["v*"]
jobs:
  publish-cli:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # Stamp committed dev defaults with real values from repo Variables
      # BEFORE build so they compile into dist/. Empty variables fail loudly.
      - name: Stamp CLI defaults from repo variables
        env:
          AURIS_AUTH0_DOMAIN: ${{ vars.AURIS_AUTH0_DOMAIN }}
          AURIS_AUTH0_AUDIENCE: ${{ vars.AURIS_AUTH0_AUDIENCE }}
          AURIS_AUTH0_CLIENT_ID: ${{ vars.AURIS_AUTH0_CLIENT_ID }}
          AURIS_BASE_URL: ${{ vars.AURIS_BASE_URL }}
        run: |
          : "${AURIS_AUTH0_DOMAIN:?Set the AURIS_AUTH0_DOMAIN repo variable}"
          : "${AURIS_AUTH0_AUDIENCE:?Set the AURIS_AUTH0_AUDIENCE repo variable}"
          : "${AURIS_AUTH0_CLIENT_ID:?Set the AURIS_AUTH0_CLIENT_ID repo variable}"
          : "${AURIS_BASE_URL:?Set the AURIS_BASE_URL repo variable}"
          cat > packages/cli/src/core/defaults.ts <<EOF
          // Auto-generated by .github/workflows/cli-release.yml from repo
          // Variables. Do not edit by hand; the committed copy carries dev
          // defaults for from-source builds.
          export const DEFAULTS = {
            aurisBaseUrl: '$AURIS_BASE_URL',
            auth0Domain: '$AURIS_AUTH0_DOMAIN',
            auth0Audience: '$AURIS_AUTH0_AUDIENCE',
            auth0ClientId: '$AURIS_AUTH0_CLIENT_ID',
          } as const;
          EOF
      - name: build + pack
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @auris/cli build
          # `pnpm pack` did not gain workspace `--filter` support until
          # v10.11.0; this repo pins pnpm@9.0.0 (root package.json
          # "packageManager"), so `pnpm --filter @auris/cli pack` fails
          # with "Unknown option: 'recursive'". cd into the package instead.
          cd packages/cli && pnpm pack
      - name: attach tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/cli/*.tgz
