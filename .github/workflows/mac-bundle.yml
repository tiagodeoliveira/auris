# Build the Mac menu-bar app and bundle it into a `.app` structure.
# Output is uploaded as a workflow artifact and (on tag pushes)
# attached to the GitHub Release.
#
# Unsigned bundle: macOS Gatekeeper will warn on first launch; users
# right-click → Open to dismiss. Code signing + notarization is a
# follow-up that requires APPLE_DEVELOPER_ID + APPLE_API_KEY secrets;
# see .github/workflows/README.md.

name: Mac bundle

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "packages/mac/**"
      - ".github/workflows/mac-bundle.yml"
  pull_request:
    paths:
      - "packages/mac/**"
      - ".github/workflows/mac-bundle.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # macos-15 ships Xcode 16, which carries the macOS 15 SDK that
    # `Package.swift` declares as the minimum (SCStream's microphone
    # capture path requires macOS 15). macos-14 / macos-latest alias
    # to Xcode 15 → max SDK is 14.5 → "minimum platform version 15.0
    # but this target supports 14.5" build failure.
    runs-on: macos-15
    permissions:
      contents: write # write needed when attaching to a Release on tag
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: packages/mac/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('packages/mac/Package.swift', 'packages/mac/Package.resolved') }}-${{ hashFiles('packages/mac/Sources/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-${{ hashFiles('packages/mac/Package.swift', 'packages/mac/Package.resolved') }}-
            ${{ runner.os }}-swift-

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Marketing version on non-tag pushes is a semver-ish
            # ${baseline}-${sha7}. Bump the baseline when shipping a
            # tagged release.
            VERSION="0.1.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build (universal release binary)
        working-directory: packages/mac
        run: |
          swift build \
            -c release \
            --arch arm64 \
            --arch x86_64

      - name: Bundle into .app
        working-directory: packages/mac
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          # Embedded into Info.plist by envsubst. All are repo
          # variables (not secrets) — these values get baked into
          # the bundle anyway, secrecy is meaningless. If a value is
          # unset the corresponding Info.plist key gets an empty
          # string; the app's runtime code falls back to its coded
          # defaults (localhost server, dev Auth0 tenant).
          MEETING_COMPANION_SERVER_URL: ${{ vars.MEETING_COMPANION_SERVER_URL }}
          AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
          AUTH0_MAC_CLIENT_ID: ${{ vars.AUTH0_MAC_CLIENT_ID }}
          AUTH0_API_AUDIENCE: ${{ vars.AUTH0_API_AUDIENCE }}
          # Sparkle public key — fail-closes auto-update if unset.
          SPARKLE_PUBLIC_KEY: ${{ vars.SPARKLE_PUBLIC_KEY }}
        run: |
          BUNDLE="MeetingCompanion.app"
          rm -rf "$BUNDLE"
          mkdir -p "$BUNDLE/Contents/MacOS" "$BUNDLE/Contents/Resources" "$BUNDLE/Contents/lib"
          # SwiftPM with multiple --arch produces a universal binary
          # under .build/apple/Products/Release.
          cp .build/apple/Products/Release/MeetingCompanion "$BUNDLE/Contents/MacOS/"
          envsubst < Info.plist.template > "$BUNDLE/Contents/Info.plist"

          # Sparkle ships as a binary-target xcframework. The linked
          # binary's rpath is `@executable_path/../lib`, so we copy
          # the framework into Contents/lib/ to match (rather than
          # the more conventional Contents/Frameworks/, which would
          # require install_name_tool surgery on the rpath). Find
          # it dynamically so SwiftPM artifact-path changes between
          # toolchain versions don't break the bundle step.
          SPARKLE_FW=$(find .build -path "*/Sparkle.framework" -type d -maxdepth 8 2>/dev/null | head -1)
          if [[ -z "$SPARKLE_FW" ]]; then
            echo "::error::Sparkle.framework not found under .build/. SwiftPM artifact layout may have changed."
            exit 1
          fi
          echo "Copying Sparkle.framework from: $SPARKLE_FW"
          # `cp -R` follows symlinks; Sparkle's .framework is a
          # bundle-of-symlinks (Versions/A → Current style), so use
          # `ditto` which preserves symlink + bundle metadata
          # correctly.
          ditto "$SPARKLE_FW" "$BUNDLE/Contents/lib/Sparkle.framework"
          # `ditto -c -k --keepParent` preserves the bundle's directory
          # structure inside the zip (matching what users get from
          # GitHub Release downloads).
          ditto -c -k --keepParent "$BUNDLE" "MeetingCompanion-${VERSION}.zip"
          ls -la "MeetingCompanion-${VERSION}.zip"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingCompanion-${{ steps.version.outputs.version }}
          path: packages/mac/MeetingCompanion-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      # ──────────  Sparkle: sign + generate appcast (tag pushes only)  ──────────
      # Tag pushes are the only events that publish a new version
      # users will auto-update to; main pushes produce sha-tagged
      # bundles for testing but don't update the appcast feed.

      - name: Set up Sparkle tools
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          SPARKLE_VERSION: "2.6.4"
        run: |
          curl -fSL -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          echo "/tmp/sparkle/bin" >> "$GITHUB_PATH"

      - name: Sign update bundle with EdDSA
        if: github.event_name == 'push' && github.ref_type == 'tag'
        id: sign
        working-directory: packages/mac
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "::error::SPARKLE_PRIVATE_KEY is not set. See .github/workflows/README.md."
            exit 1
          fi
          # Write key to a temp file just long enough for sign_update
          # to consume it. Avoid leaving any trace in the workspace.
          KEY_FILE="$(mktemp)"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          # `sign_update -f <keyfile>` returns a single line containing
          # the `sparkle:edSignature` and `length` attributes ready to
          # paste into the appcast's <enclosure>.
          SIG_BLOB=$(sign_update -f "$KEY_FILE" "MeetingCompanion-${VERSION}.zip")
          rm -f "$KEY_FILE"
          # Multi-line outputs need EOF-delimiter syntax to round-trip
          # through GITHUB_OUTPUT cleanly.
          {
            echo "sig_blob<<EOF"
            echo "$SIG_BLOB"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate appcast.xml
        if: github.event_name == 'push' && github.ref_type == 'tag'
        working-directory: packages/mac
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          SIG_BLOB: ${{ steps.sign.outputs.sig_blob }}
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MeetingCompanion-${{ steps.version.outputs.version }}.zip
        run: |
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S GMT")
          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
              <channel>
                  <title>Meeting Companion</title>
                  <link>https://github.com/${GITHUB_REPOSITORY}</link>
                  <description>Auto-update feed for the Meeting Companion menu-bar app.</description>
                  <language>en</language>
                  <item>
                      <title>Version ${VERSION}</title>
                      <pubDate>${PUB_DATE}</pubDate>
                      <sparkle:version>${BUILD}</sparkle:version>
                      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>
                      <enclosure url="${DOWNLOAD_URL}" ${SIG_BLOB} type="application/octet-stream" />
                  </item>
              </channel>
          </rss>
          EOF
          echo "::group::appcast.xml"
          cat appcast.xml
          echo "::endgroup::"

      - name: Attach to release on tag
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/mac/MeetingCompanion-${{ steps.version.outputs.version }}.zip
            packages/mac/appcast.xml
          fail_on_unmatched_files: true
