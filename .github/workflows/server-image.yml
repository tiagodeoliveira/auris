# Build the server's Docker image and push it to GitHub Container
# Registry. Visibility (private vs public) inherits from the package
# settings — set to "private" once the first push lands so the image
# stays internal.
#
# Triggers:
#   - push to main          → tags `latest` + `sha-<short>`
#   - push of a `v*` tag    → tags `<tag>` + `latest`
#   - pull_request          → build-only (no push) to validate Dockerfile
#                             changes before merge
#   - workflow_dispatch     → manual rebuild from any branch
#
# Path filters keep this workflow off changes to packages/{pwa,mac,mobile}
# and docs/.

name: Server image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "packages/server/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/server-image.yml"
  pull_request:
    paths:
      - "packages/server/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/server-image.yml"
  workflow_dispatch:

# Opt every JavaScript action in this workflow into Node 24 to clear
# the "Node.js 20 actions are deprecated" warnings. GitHub forces
# Node 24 for everyone on 2026-06-02 anyway; flipping it now means
# we'd see incompatibilities early rather than on the deadline.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build${{ github.event_name == 'pull_request' && '' || ' & push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Owner casing matters for ghcr — `github.repository_owner`
          # preserves the source case but the registry lowercases on
          # store. Both forms resolve.
          images: ghcr.io/${{ github.repository_owner }}/meeting-companion-server
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push when not a PR)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # linux/amd64 only for now — the prod target is an x86 VM.
          # Add linux/arm64 when there's a deployment target that
          # needs it (Apple Silicon dev box, Graviton, etc.).
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
