// Events â€” messages the server broadcasts to clients. Mirrors the
// `Event` enum in `packages/server/src/contract.rs`.
//
// Same envelope shape as `Intent`: a wrapper message with a `kind`
// oneof. Clients dispatch on which variant is set; unknown variants
// (forward-compat case) MUST be ignored gracefully (no UI breakage).
//
// Adding a new event:
//   1. Define a new message `MyEvent` below.
//   2. Add `MyEvent my_event = N;` to the `kind` oneof, picking the
//      next free field number.
//   3. New events flow through automatically â€” old clients ignore;
//      new clients dispatch normally.
//
// Removing an event: `reserved <num>;` in the oneof.

syntax = "proto3";

package auris.v1;

import "auris/v1/common.proto";

// First message after a successful WS connect. Carries the full
// per-user state needed to render any client without prior context.
message Snapshot {
  uint32 protocol_version = 1;
  MeetingState meeting_state = 2;
  // Server-assigned id of the active meeting. Empty when idle.
  optional string meeting_id = 3;
  repeated ModeOption available_modes = 4;
  string mode = 5;
  optional string display_tag = 6;
  map<string, string> metadata = 7;
  repeated Item items = 8;
  Status status = 9;
  // mnemo recall counts. Absent when no recall has populated yet.
  optional PriorContextSummary prior_context = 10;
  // All currently-registered devices. Empty list = no devices yet.
  repeated Device devices = 11;
  // Device feeding audio for the active meeting. Empty when no
  // audio source is bound.
  optional string audio_source_device_id = 12;
}

// After every lifecycle transition (Idle â†” Active â†” Paused).
// `meeting_id` present when going to Active/Paused; empty going Idle.
message MeetingStateChanged {
  MeetingState meeting_state = 1;
  optional string meeting_id = 2;
}

// After `set_mode`. Carries the items list for the new mode so the
// client doesn't need a follow-up round trip.
message ModeChanged {
  string mode = 1;
  optional string display_tag = 2;
  repeated Item items = 3;
}

// Mode-specific status string that some modes display alongside
// items. Empty `tag` clears the prior value.
message DisplayTagChanged {
  optional string tag = 1;
}

// Full metadata after any change. Send the full map, not a diff â€”
// avoids sequencing bugs on lossy reconnect.
message MetadataChanged {
  map<string, string> metadata = 1;
}

// After mnemo recall completes (or clears). All-zero counts means
// cleared.
message PriorContextChanged {
  PriorContextSummary summary = 1;
}

// Per-mode item list update. Strategy depends on the mode (Replace
// for highlights/summary/chat, Append for transcript/actions/
// open_questions). Clients learn the mode's strategy via
// `available_modes` in the snapshot.
message ItemsUpdate {
  string mode = 1;
  repeated Item items = 2;
}

// One item changed in-place (today's only producer is `expand_item`
// â€” agent writes the LLM expansion into the item's `detail`). Clients
// replace by id within the mode's list. Works uniformly across
// Replace and Append strategies â€” semantics is "replace this row,"
// not "append" or "overwrite the whole list."
message ItemUpdated {
  string mode = 1;
  Item item = 2;
}

// Live in-flight transcript chunk between sentence boundaries.
// Clients render as the dim italic "live row" in transcript mode.
message TranscriptInterim {
  string text = 1;
}

// Heartbeat-driven status (~3s while active). Also used for transient
// extraction errors.
message StatusEvent {
  Status status = 1;
}

// Per-intent rejection delivered to the originating client only.
// Codes: `bad_payload`, `unknown_intent`, `unknown_mode`,
// `unknown_item` (legacy `bad_json` no longer applies â€” payloads
// are protobuf, not JSON).
message Error {
  string code = 1;
  string message = 2;
  optional string intent_ref = 3;
}

// Sent only to the connection that just registered. Carries the
// server-assigned `device_id` so the client can identify itself in
// subsequent device lists / commands.
message DeviceRegistered {
  Device device = 1;
}

// Broadcast on registration / disconnect / capability change. Full
// current list â€” clients replace their cache.
message DevicesChanged {
  repeated Device devices = 1;
}

// Audio-source binding for the active meeting changed (start / stop
// / rebind). Empty `device_id` means unbound.
message AudioSourceDeviceChanged {
  optional string device_id = 1;
}

// Attached-artifact set for the active meeting changed (attach or
// detach). Carries the full current set of artifact IDs so clients
// overwrite their local mirror â€” no diff/incremental logic needed.
message ArtifactsChanged {
  repeated string artifact_ids = 1;
}

// Point-to-point to the bound `screen_capture`-capable device only.
// Recipient uploads via `POST /meetings/:id/moments/:mid/screenshot`.
message CaptureMomentScreenshot {
  string meeting_id = 1;
  string moment_id = 2;
  int64 t_ms = 3;
}

// Moment-summary worker wrote the final summary text. Currently
// consumed by the mnemo pusher; PWA / Mac / mobile ignore.
message MomentSummarized {
  string moment_id = 1;
  string meeting_id = 2;
  int64 t_ms = 3;
  string summary = 4;
  optional string note = 5;
}

// Top-level event envelope.
message Event {
  oneof kind {
    Snapshot snapshot = 1;
    MeetingStateChanged meeting_state_changed = 2;
    ModeChanged mode_changed = 3;
    DisplayTagChanged display_tag_changed = 4;
    MetadataChanged metadata_changed = 5;
    PriorContextChanged prior_context_changed = 6;
    ItemsUpdate items_update = 7;
    ItemUpdated item_updated = 8;
    TranscriptInterim transcript_interim = 9;
    StatusEvent status = 10;
    Error error = 11;
    DeviceRegistered device_registered = 12;
    DevicesChanged devices_changed = 13;
    AudioSourceDeviceChanged audio_source_device_changed = 14;
    ArtifactsChanged artifacts_changed = 15;
    CaptureMomentScreenshot capture_moment_screenshot = 16;
    MomentSummarized moment_summarized = 17;
  }
}
