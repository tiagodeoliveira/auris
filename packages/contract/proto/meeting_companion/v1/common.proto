// Shared types referenced by both intents and events. Source of truth
// for the wire contract — `packages/contract/rust/src/lib.rs` exposes
// the prost-generated types as the canonical Rust shape.
//
// Wire format: binary protobuf over WS binary frames. Field numbers
// are the wire identity; per-language names are idiomatic to that
// language's generator (snake_case in Rust via prost, camelCase in
// TS/Swift).
//
// Schema evolution rules (proto3):
//   - Adding fields: free; old clients ignore unknown numbers.
//   - Adding oneof variants: free for events (clients ignore unknown);
//     intents need server logic to handle "unknown variant" case.
//   - Adding enum values: free; old clients preserve as integer.
//   - Removing fields: use `reserved <num>;` so the number can never
//     be reused. Same for renamed fields.
//   - Changing field type or number: BREAKING. Bump PROTOCOL_VERSION
//     in events.proto's Snapshot, and roll all clients in lockstep.

syntax = "proto3";

package meeting_companion.v1;

// Lifecycle state of a single user's meeting.
enum MeetingState {
  MEETING_STATE_UNSPECIFIED = 0;
  MEETING_STATE_IDLE = 1;
  MEETING_STATE_ACTIVE = 2;
  MEETING_STATE_PAUSED = 3;
}

// How a mode's `items` list is updated when the server emits an
// `ItemsUpdate`. `replace` swaps the whole list; `append` adds new
// items at the tail.
enum UpdateStrategy {
  UPDATE_STRATEGY_UNSPECIFIED = 0;
  UPDATE_STRATEGY_REPLACE = 1;
  UPDATE_STRATEGY_APPEND = 2;
}

// One mode (tab) the user can switch to within an active meeting.
// The server defines the catalog at compile time; clients render
// whatever the snapshot delivers (no client-side hardcoding).
message ModeOption {
  string id = 1;
  string label = 2;
  UpdateStrategy update_strategy = 3;
}

// One row in a mode's items list. `meta` is mode-specific extras
// (e.g. speaker tag for transcript items, importance for highlights,
// role for chat bubbles).
message Item {
  string id = 1;
  string text = 2;
  // Lazy-loaded long-form text; empty until `expand_item` populates it.
  optional string detail = 3;
  // Milliseconds since the meeting started.
  uint64 t = 4;
  // Mode-specific extras. Heterogeneous JSON-like structure;
  // protobuf's google.protobuf.Struct is the right shape but
  // requires importing it. Modeled as a serialized JSON string for
  // wire stability — clients parse on demand. (Future: switch to
  // google.protobuf.Struct if the meta surface stabilizes.)
  optional string meta_json = 5;
}

// Heartbeat-driven status the server pushes ~every 3s during an
// active meeting. `error` carries transient error strings (e.g.
// LLM extraction failed) that surface as toasts in the UI.
message Status {
  bool listening = 1;
  bool paused = 2;
  optional string error = 3;
}

// Counts of memories recalled from mnemo at meeting start. Drives
// the "★ memory · N recalled" badge on PWA / Mac / mobile.
message PriorContextSummary {
  uint64 preferences = 1;
  uint64 facts = 2;
  uint64 episodes = 3;
  uint64 project_memories = 4;
}

// Capabilities a connected client offers to the meeting. Drives the
// audio-source picker (filters by `audio_capture`), the
// moment-screenshot trigger (filters by `screen_capture`), etc.
enum Capability {
  CAPABILITY_UNSPECIFIED = 0;
  CAPABILITY_AUDIO_CAPTURE = 1;
  CAPABILITY_SCREEN_CAPTURE = 2;
  CAPABILITY_CONTROL_SURFACE = 3;
  // Sub-capability of audio_capture: distinguishes "Mac with
  // ScreenCaptureKit system audio" from "phone with mic permission."
  CAPABILITY_SYSTEM_AUDIO = 4;
}

// A registered client device. The server tracks one entry per active
// WS connection that has sent `RegisterDevice`. `online` flips to
// false on disconnect.
message Device {
  string id = 1;
  string hostname = 2;
  repeated Capability capabilities = 3;
  bool online = 4;
}
