<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Auris</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#d97757" />
    <!--
      Fonts are imported from `@fontsource/*` inside src/main.ts so
      Vite bundles the .woff2 files into dist/assets and the
      EvenHub webview never needs to reach fonts.googleapis.com /
      fonts.gstatic.com. No CDN whitelist entries required;
      works offline.
    -->
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
